<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BeatFlow V5</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body>

<div class="app">

    <!-- Sidebar -->
    <aside class="sidebar">

        <div class="logo">
            <i class="fa-solid fa-music"></i>
            <span>BeatFlow</span>
        </div>

        <nav>

            <a href="#" class="active">
                <i class="fa-solid fa-house"></i>
                خانه
            </a>

            <a href="#">
                <i class="fa-solid fa-magnifying-glass"></i>
                جستجو
            </a>

            <a href="#">
                <i class="fa-solid fa-heart"></i>
                مورد علاقه
            </a>

        </nav>

        <div class="playlist-section">

            <h3>پلی لیست</h3>

            <input
            type="text"
            id="search"
            placeholder="جستجوی آهنگ...">

            <ul id="playlist"></ul>

        </div>

    </aside>

    <!-- Main Content -->
    <main class="main-content">

        <div class="hero">

            <div class="hero-text">

                <span class="badge">
                    در حال پخش
                </span>

                <h1 id="title">
                    Song 1
                </h1>

                <h3 id="artist">
                    Artist 1
                </h3>

                <div class="hero-buttons">

                    <button id="heroPlay">
                        <i class="fa-solid fa-play"></i>
                        پخش
                    </button>

                    <button id="likeBtn">
                        <i class="fa-solid fa-heart"></i>
                        علاقه‌مندی
                    </button>

                    <a
                    id="downloadBtn"
                    class="download-btn"
                    href="#"
                    download>

                        <i class="fa-solid fa-download"></i>
                        دانلود

                    </a>

                </div>

            </div>

            <img
            id="cover"
            src="covers/cover1.jpg"
            alt="cover">

        </div>

        <!-- Albums -->

        <section class="albums">

            <h2>محبوب ترین ها</h2>

            <div class="album-grid">

                <div class="album-card">
                    <img src="covers/OIP (1).webp">
                    <h4>Album 1</h4>
                </div>

                <div class="album-card">
                    <img src="covers/OIP (1).webp">
                    <h4>Album 2</h4>
                </div>

                <div class="album-card">
                    <img src="covers/OIP (1).webp">
                    <h4>Album 3</h4>
                </div>

                <div class="album-card">
                    <img src="covers/OIP.webp">
                    <h4>Album 4</h4>
                </div>

                <div class="album-card">
                    <img src="covers/OIP.webp">
                    <h4>Album 5</h4>
                </div>

            </div>

        </section>

    </main>

</div>

<!-- Player Bottom -->

<footer class="player">

    <div class="player-left">

        <img
        id="miniCover"
        src="covers/cover1.jpg">

        <div>

            <h4 id="miniTitle">
                Song 1
            </h4>

            <small id="miniArtist">
                Artist 1
            </small>

        </div>

    </div>

    <div class="player-center">

        <div class="controls">

            <button id="shuffle">
                <i class="fa-solid fa-shuffle"></i>
            </button>

            <button id="prev">
                <i class="fa-solid fa-backward-step"></i>
            </button>

            <button id="play">
                <i class="fa-solid fa-play"></i>
            </button>

            <button id="next">
                <i class="fa-solid fa-forward-step"></i>
            </button>

            <button id="repeat">
                <i class="fa-solid fa-repeat"></i>
            </button>

        </div>

        <div class="progress-box">

            <span id="currentTime">
                0:00
            </span>

            <input
            type="range"
            id="progress"
            value="0">

            <span id="duration">
                0:00
            </span>

        </div>

    </div>

    <div class="player-right">

        <i class="fa-solid fa-volume-high"></i>

        <input
        type="range"
        id="volume"
        min="0"
        max="100"
        value="80">

    </div>

</footer>

<audio id="audio"></audio>

<script src="script.js"></script>

</body>
</html>
